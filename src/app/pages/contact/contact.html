<section class="py-32">
  <div class="max-w-4xl mx-auto px-6">
    <!-- Header -->
    <div class="text-center space-y-6 mb-16">
      <h1 class="text-5xl font-semibold tracking-tight">Let’s Work Together</h1>

      <p class="text-slate-400 max-w-2xl mx-auto leading-relaxed text-lg">
        I’m currently seeking junior or entry-level full-stack development roles. If you're looking
        for someone who approaches engineering with structure, resilience, and long-term thinking —
        I’d love to connect.
      </p>

      <div class="w-24 h-px bg-slate-700 mx-auto mt-6"></div>
    </div>

    <!-- Contact Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-12 shadow-xl">
      <div class="flex flex-col items-center space-y-10 text-center">
        <h2 class="text-xl font-semibold">Connect</h2>

        <!-- Email -->
        <a href="mailto:your@email.com" class="text-slate-300 hover:text-emerald-400 transition">
          Hope.Coduh@gmail.com
        </a>

        <!-- Social Icons -->
        <div class="flex items-center gap-8">
          <!-- GitHub -->
          <a href="https://github.com/Hopecoduh" target="_blank" class="group">
            <img
              src="/images/GitHub_logo.png"
              alt="GitHub"
              class="w-14 h-14 object-contain opacity-80 group-hover:opacity-100 group-hover:scale-110 transition duration-200"
            />
          </a>

          <!-- LinkedIn -->
          <a href="https://www.linkedin.com/in/mackenzie-green813/" target="_blank" class="group">
            <img
              src="/images/LinkedIn_logo.png"
              alt="LinkedIn"
              class="w-24 h-24 object-contain opacity-80 group-hover:opacity-100 group-hover:scale-110 transition duration-200"
            />
          </a>
        </div>

        <!-- Resume Button -->
        <button (click)="openResume()" class="px-8 py-3 bg-emerald-600 rounded-lg">
          View Resume
        </button>
      </div>
    </div>
  </div>

  <!-- Resume Modal -->
  <!-- Resume Modal -->
  <div
    *ngIf="showResume"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50"
  >
    <div
      class="bg-slate-900 border border-slate-800 rounded-2xl w-[95%] max-w-5xl h-[85vh] shadow-2xl flex flex-col"
    >
      <!-- Header -->
      <div class="flex justify-between items-center p-6 border-b border-slate-800">
        <h2 class="text-xl font-semibold">Mackenzie Green — Resume</h2>

        <button (click)="closeResume()" class="text-slate-400 hover:text-white transition text-sm">
          Close
        </button>
      </div>

      <!-- PDF Viewer -->
      <div class="flex-1 overflow-hidden">
        <embed
          src="/resume/Mackenzie_Green_Resume.pdf#toolbar=0"
          type="application/pdf"
          class="w-full h-full bg-white"
        />
      </div>

      <!-- Footer -->
      <div class="p-4 border-t border-slate-800 text-center">
        <a
          href="/resume/Mackenzie_Green_Resume.pdf"
          download
          class="text-emerald-400 hover:text-emerald-300 transition text-sm"
        >
          Download PDF
        </a>
      </div>
    </div>
  </div>
</section>
